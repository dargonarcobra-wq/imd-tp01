<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOTOAMIGOS: THE GAME!</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'surface': '#fcf9f8',
            'surface-dim': '#dcd9d9',
            'surface-container': '#f0eded',
            'surface-container-low': '#f6f3f2',
            'surface-container-lowest': '#ffffff',
            'surface-container-high': '#eae7e7',
            'surface-container-highest': '#e5e2e1',
            'on-background': '#1c1b1b',
            'on-surface': '#1c1b1b',
            'on-surface-variant': '#5b403e',
            'primary': '#b61722',
            'on-primary': '#ffffff',
            'primary-container': '#da3437',
            'on-primary-container': '#fffbff',
            'secondary': '#0058be',
            'on-secondary': '#ffffff',
            'secondary-container': '#2170e4',
            'on-secondary-container': '#fefcff',
            'tertiary': '#735c00',
            'on-tertiary': '#ffffff',
            'tertiary-container': '#cea700',
            'on-tertiary-container': '#4e3e00',
            'tertiary-fixed': '#ffe083',
            'tertiary-fixed-dim': '#eec200',
            'on-tertiary-fixed': '#231b00',
            'on-tertiary-fixed-variant': '#574500',
            'inverse-surface': '#313030',
            'inverse-on-surface': '#f3f0ef',
            'outline': '#8f6f6d',
            'outline-variant': '#e4beba',
            'error': '#ba1a1a',
          },
          fontFamily: {
            'card-title': ['Lexend', 'sans-serif'],
            'stat-value': ['Space Grotesk', 'sans-serif'],
            'stat-label': ['Space Grotesk', 'sans-serif'],
            'body-md': ['Lexend', 'sans-serif'],
            'button-text': ['Lexend', 'sans-serif'],
          },
          fontSize: {
            'card-title': ['24px', { lineHeight: '28px', letterSpacing: '-0.02em', fontWeight: '900' }],
            'stat-value': ['20px', { lineHeight: '24px', fontWeight: '700' }],
            'stat-label': ['12px', { lineHeight: '16px', fontWeight: '500' }],
            'body-md': ['16px', { lineHeight: '24px', fontWeight: '400' }],
            'button-text': ['18px', { lineHeight: '24px', fontWeight: '800' }],
          },
          borderRadius: {
            DEFAULT: '0.25rem',
            lg: '0.5rem',
            xl: '0.75rem',
            '2xl': '1rem',
            '3xl': '1.5rem',
            full: '9999px',
          },
          spacing: {
            'unit': '4px',
            'card-padding': '16px',
            'gutter': '12px',
            'stack-gap': '8px',
            'section-margin': '32px',
          },
        },
      },
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Space+Grotesk:wght@500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-surface text-on-background min-h-screen font-body-md overflow-x-hidden">

  <!-- ========== APP ROOT ========== -->
  <div id="app">

    <!-- ===== P01: SPLASH ===== -->
    <div id="screen-splash" class="screen active">
      <div class="splash-bg">
        <div class="splash-tapete"></div>
      </div>
      <div class="splash-content">
        <h1 class="splash-title">FOTOAMIGOS</h1>
        <p class="splash-subtitle">THE GAME!</p>
        <p class="splash-course">Hipertexto e Interfaz — IMD 2025</p>
        <button id="btn-start" class="splash-btn">
          <span class="material-symbols-outlined mr-2" style="font-variation-settings:'FILL' 1,'wght' 700">style</span>
          EMPEZAR JUEGO!
        </button>
      </div>
    </div>

    <!-- ===== APP SHELL (visible after splash) ===== -->
    <div id="app-shell" class="hidden">

      <!-- HEADER -->
      <header id="app-header" class="app-header">
        <div id="header-left" class="header-left">
          <button id="btn-back" class="btn-back hidden" aria-label="Volver">
            <span class="material-symbols-outlined">arrow_back</span>
            <span class="btn-back-text">VOLVER</span>
          </button>
        </div>
        <div id="header-center" class="header-center"></div>
        <div id="header-right" class="header-right">
          <a id="logo-link" class="logo-link" href="#" aria-label="Ir a inicio">
            <span class="material-symbols-outlined logo-icon" style="font-variation-settings:'FILL' 1">auto_awesome</span>
            <span class="logo-text">FOTOAMIGOS</span>
          </a>
        </div>
      </header>

      <!-- MAIN CONTENT -->
      <main id="main-content">

        <!-- P02: HOME -->
        <div id="screen-home" class="screen">
          <div id="home-grid" class="home-grid"></div>
        </div>

        <!-- P03: ATRIBUTO -->
        <div id="screen-atributo" class="screen hidden">
          <div class="atributo-layout">
            <div id="attr-shared" class="attr-column attr-shared"></div>
            <div id="attr-unshared" class="attr-column attr-unshared"></div>
          </div>
        </div>

        <!-- P04: SUPERHEROE -->
        <div id="screen-superheroe" class="screen hidden">
          <div class="superheroe-layout">
            <div id="hero-details" class="hero-details"></div>
            <div id="hero-photos" class="hero-photos"></div>
          </div>
          <div id="hero-thumbnails" class="hero-thumbnails"></div>
        </div>

      </main>
    </div>

    <!-- ===== EXPANDED CARD OVERLAY ===== -->
    <div id="overlay" class="overlay hidden" role="dialog" aria-label="Detalle de carta">
      <div id="overlay-backdrop" class="overlay-backdrop"></div>
      <div id="overlay-card" class="overlay-card"></div>
    </div>

  </div>

  <!-- ========== SCRIPTS ========== -->
  <script src="app.js"></script>
</body>
</html>

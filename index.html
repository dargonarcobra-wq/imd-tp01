<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOTOAMIGOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">
    <h1 id="pageTitle">FOTOAMIGOS</h1>
    <div class="subtitle">Hipertexto e Interfaz — IMD 2025</div>
  </div>

  <div class="screen-title" id="screenTitle"></div>

  <button class="back-btn" id="backBtn" onclick="showMainScreen()">← VOLVER</button>

  <!-- MAIN SCREEN: 8 cards face down -->
  <div class="cards-grid" id="mainScreen"></div>

  <!-- ATTRIBUTE SCREEN: filtered mini cards -->
  <div class="attribute-screen" id="attrScreen">
    <div class="mini-cards-grid" id="attrCards"></div>
  </div>

  <script src="data.js"></script>
  <script>
    // ---- STATE ----
    let flippedCards = new Set();

    // ---- BUILD WATERMARK TEXT for card backs ----
    function buildWatermark() {
      const container = document.createElement('div');
      container.className = 'card-back-watermark';
      const text = 'FOTOAMIGOS';
      let idx = 0;
      for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 5; col++) {
          const span = document.createElement('span');
          span.textContent = text;
          span.style.left = (col * 55 - 20 + row * 15) + 'px';
          span.style.top = (row * 42 - 10) + 'px';
          span.style.transform = 'rotate(-45deg)';
          container.appendChild(span);
          idx++;
        }
      }
      return container;
    }

    // ---- BUILD CARD BACK ----
    function buildCardBack() {
      const back = document.createElement('div');
      back.className = 'card-face card-back';

      const pattern = document.createElement('div');
      pattern.className = 'card-back-pattern';

      const emblem = document.createElement('div');
      emblem.className = 'card-back-emblem';

      pattern.appendChild(emblem);
      pattern.appendChild(buildWatermark());
      back.appendChild(pattern);
      return back;
    }

    // ---- FORMAT ATTRIBUTE VALUES (clickable) ----
    function buildAttrValues(compañero, attrKey) {
      const container = document.createElement('div');
      container.className = 'card-attr-values';

      const values = compañero[attrKey];
      values.forEach((val, i) => {
        if (i > 0) {
          const comma = document.createElement('span');
          comma.className = 'card-attr-value comma';
          comma.textContent = ', ';
          container.appendChild(comma);
        }
        const span = document.createElement('span');
        span.className = 'card-attr-value';
        span.textContent = val;
        span.onclick = (e) => {
          e.stopPropagation();
          showAttributeScreen(attrKey, val);
        };
        container.appendChild(span);
      });

      return container;
    }

    // ---- BUILD CARD FRONT ----
    function buildCardFront(compañero) {
      const front = document.createElement('div');
      front.className = 'card-face card-front';

      // Photo
      const photo = document.createElement('div');
      photo.className = 'card-photo';
      const img = document.createElement('img');
      img.src = `img/${compañero.nombre.toLowerCase().replace(/\s+/g, '_')}.jpg`;
      img.alt = compañero.nombre;
      img.onerror = function() {
        this.style.display = 'none';
        const ph = document.createElement('div');
        ph.className = 'placeholder-icon';
        ph.textContent = '📷';
        this.parentElement.appendChild(ph);
      };
      photo.appendChild(img);
      front.appendChild(photo);

      // Name
      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = compañero.nombre;
      front.appendChild(name);

      // Attributes
      const attrs = document.createElement('div');
      attrs.className = 'card-attrs';

      ATRIBUTOS.forEach(attr => {
        const row = document.createElement('div');
        row.className = 'card-attr-row';

        const label = document.createElement('span');
        label.className = 'card-attr-label';
        label.textContent = attr.label;
        row.appendChild(label);

        row.appendChild(buildAttrValues(compañero, attr.key));
        attrs.appendChild(row);
      });

      front.appendChild(attrs);
      return front;
    }

    // ---- BUILD MAIN SCREEN ----
    function buildMainScreen() {
      const grid = document.getElementById('mainScreen');
      grid.innerHTML = '';

      COMPANIEROS.forEach((comp, idx) => {
        const container = document.createElement('div');
        container.className = 'card-container';
        container.dataset.index = idx;

        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${idx}`;

        card.appendChild(buildCardBack());
        card.appendChild(buildCardFront(comp));

        container.appendChild(card);
        container.onclick = () => flipCard(idx);

        grid.appendChild(container);
      });
    }

    // ---- FLIP CARD ----
    function flipCard(idx) {
      const card = document.getElementById(`card-${idx}`);
      if (card.classList.contains('flipped')) {
        card.classList.remove('flipped');
        flippedCards.delete(idx);
      } else {
        card.classList.add('flipped');
        flippedCards.add(idx);
      }
    }

    // ---- FIND COMPANIEROS WITH SHARED ATTRIBUTE ----
    function findCompañerosWithAttr(attrKey, attrValue) {
      const normalizedVal = attrValue.toLowerCase().trim();
      return COMPANIEROS.filter(c => 
        c[attrKey].some(v => v.toLowerCase().trim() === normalizedVal)
      );
    }

    // ---- COUNT SHARED ----
    function countShared(attrKey, attrValue) {
      return findCompañerosWithAttr(attrKey, attrValue).length;
    }

    // ---- SHOW ATTRIBUTE SCREEN ----
    function showAttributeScreen(attrKey, attrValue) {
      const matched = findCompañerosWithAttr(attrKey, attrValue);
      const attrLabel = ATRIBUTOS.find(a => a.key === attrKey).label;

      // Update page title
      document.getElementById('pageTitle').textContent = attrValue.toUpperCase();
      document.getElementById('screenTitle').innerHTML = 
        `${attrLabel}<span class="attr-label"> — ${matched.length} compañero${matched.length > 1 ? 's' : ''}</span>`;
      document.getElementById('screenTitle').classList.add('visible');

      // Show back button
      document.getElementById('backBtn').classList.add('visible');

      // Hide main, show attr
      document.getElementById('mainScreen').style.display = 'none';
      const attrScreen = document.getElementById('attrScreen');
      attrScreen.classList.add('active');

      // Build mini cards
      const grid = document.getElementById('attrCards');
      grid.innerHTML = '';

      matched.forEach((comp, idx) => {
        const card = document.createElement('div');
        card.className = 'mini-card';
        card.style.animation = `cardAppear 0.4s ease forwards`;
        card.style.animationDelay = `${idx * 0.08}s`;
        card.style.opacity = '0';

        // Photo
        const photo = document.createElement('div');
        photo.className = 'mini-card-photo';
        const img = document.createElement('img');
        img.src = `img/${comp.nombre.toLowerCase().replace(/\s+/g, '_')}.jpg`;
        img.alt = comp.nombre;
        img.onerror = function() {
          this.style.display = 'none';
          const ph = document.createElement('div');
          ph.className = 'placeholder-icon';
          ph.textContent = '📷';
          this.parentElement.appendChild(ph);
        };
        photo.appendChild(img);
        card.appendChild(photo);

        // Name
        const name = document.createElement('div');
        name.className = 'mini-card-name';
        name.textContent = comp.nombre;
        card.appendChild(name);

        // Attributes
        const attrs = document.createElement('div');
        attrs.className = 'mini-card-attrs';

        ATRIBUTOS.forEach(attr => {
          const row = document.createElement('div');
          row.className = 'mini-card-attr-row';

          const label = document.createElement('span');
          label.className = 'mini-card-attr-label';
          label.textContent = attr.label;
          row.appendChild(label);

          const valuesDiv = document.createElement('div');
          valuesDiv.className = 'card-attr-values';

          comp[attr.key].forEach((val, i) => {
            if (i > 0) {
              const comma = document.createElement('span');
              comma.className = 'card-attr-value comma';
              comma.textContent = ', ';
              valuesDiv.appendChild(comma);
            }

            const span = document.createElement('span');
            span.className = 'mini-card-attr-value';
            span.textContent = val;

            // Highlight the matching attribute value
            const isMatch = attr.key === attrKey && val.toLowerCase().trim() === attrValue.toLowerCase().trim();
            if (isMatch) {
              span.classList.add('highlight');
            }

            // Make clickable if others share this value
            span.style.cursor = 'pointer';
            span.onclick = (e) => {
              e.stopPropagation();
              // If clicking a different attribute value, navigate to it
              if (attr.key !== attrKey || val.toLowerCase().trim() !== attrValue.toLowerCase().trim()) {
                showAttributeScreen(attr.key, val);
              }
            };

            valuesDiv.appendChild(span);
          });

          row.appendChild(valuesDiv);
          attrs.appendChild(row);
        });

        card.appendChild(attrs);
        grid.appendChild(card);
      });
    }

    // ---- SHOW MAIN SCREEN ----
    function showMainScreen() {
      document.getElementById('pageTitle').textContent = 'FOTOAMIGOS';
      document.getElementById('screenTitle').classList.remove('visible');
      document.getElementById('backBtn').classList.remove('visible');
      document.getElementById('mainScreen').style.display = 'flex';
      document.getElementById('attrScreen').classList.remove('active');

      // Restore flipped state
      flippedCards.forEach(idx => {
        const card = document.getElementById(`card-${idx}`);
        if (card) card.classList.add('flipped');
      });
    }

    // ---- INIT ----
    buildMainScreen();
  </script>
</body>
</html>
